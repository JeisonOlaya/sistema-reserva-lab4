services:

  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: reservas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reservas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservas_net

  # Backend FastAPI
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: reservas_backend
    restart: unless-stopped
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - reservas_net
    volumes:
      - .:/app

  # Frontend React + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.Frontend
    container_name: reservas_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - reservas_net

networks:
  reservas_net:
    driver: bridge

volumes:
  postgres_data: